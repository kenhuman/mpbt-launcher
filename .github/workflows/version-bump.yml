# Bumps the version in all five config files on every push to master — BUT
# ONLY if one of these conditions is true:
#
#   1. The squash-merge commit message contains an explicit @version directive
#      (GitHub includes the PR description in squash-merge commit messages), OR
#   2. A git tag for the current version (v{current}) already exists, meaning
#      that version has been released and this commit must ship as a new version
#      so auto-update fires for existing users.
#
# If neither condition is met the workflow exits silently (no bump, no commit).
# Running on push (rather than pull_request) means fork PRs are handled
# naturally — by the time this runs the code is already in the main repo.
#
# @version directives (place anywhere in the PR body / commit message):
#
#   @version patch            0.1.0 → 0.1.1   (default when directive present but no keyword)
#   @version minor            0.1.0 → 0.2.0
#   @version major            0.1.0 → 1.0.0
#   @version 1.2.3            sets an explicit version
#
# The bump commit is tagged "[skip ci]" so the release workflow does not fire.

name: Version bump

on:
  push:
    branches: [master]

permissions:
  contents: write   # required to push the bump commit

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout master ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.VERSION_BUMP_TOKEN || github.token }}

      # ── Parse @version directive and calculate new version ─────────────────
      - name: Resolve new version
        id: resolve
        run: |
          # Read @version from the squash-merge commit message (which GitHub
          # populates with the PR title + body on squash merges).
          COMMIT_MSG=$(git log -1 --format='%B')
          DIRECTIVE=$(printf '%s' "$COMMIT_MSG" | grep -oiP '(?<=@version )\S+' | head -1)

          CURRENT=$(jq -r '.version' src-tauri/tauri.conf.json)

          # Condition 1: explicit @version directive in commit message
          HAS_DIRECTIVE=false
          [ -n "$DIRECTIVE" ] && HAS_DIRECTIVE=true

          # Condition 2: a release tag for the current version already exists
          git fetch --tags --quiet
          TAG_EXISTS=false
          git tag -l "v${CURRENT}" | grep -q . && TAG_EXISTS=true

          if [ "$HAS_DIRECTIVE" = "false" ] && [ "$TAG_EXISTS" = "false" ]; then
            echo "No @version directive and tag v${CURRENT} does not exist — skipping bump."
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            echo "current=$CURRENT"  >> "$GITHUB_OUTPUT"
            echo "new=$CURRENT"      >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MAJ=$(echo "$CURRENT" | cut -d. -f1)
          MIN=$(echo "$CURRENT" | cut -d. -f2)
          PAT=$(echo "$CURRENT" | cut -d. -f3)

          # Explicit semver overrides everything; named keywords bump that component
          if printf '%s' "$DIRECTIVE" | grep -qP '^\d+\.\d+\.\d+$'; then
            NEW="$DIRECTIVE"
          elif [ "${DIRECTIVE,,}" = "major" ]; then
            NEW="$((MAJ+1)).0.0"
          elif [ "${DIRECTIVE,,}" = "minor" ]; then
            NEW="${MAJ}.$((MIN+1)).0"
          else
            # "patch" keyword, unknown keyword, or no directive (tag-triggered) → patch bump
            NEW="${MAJ}.${MIN}.$((PAT+1))"
          fi

          echo "should_bump=true" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW"         >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW (directive: ${DIRECTIVE:-<none — tag-triggered patch bump>})"

      # ── Update the five version files ─────────────────────────────────────
      - name: Apply version bump
        if: steps.resolve.outputs.should_bump == 'true' && steps.resolve.outputs.current != steps.resolve.outputs.new
        env:
          V: ${{ steps.resolve.outputs.new }}
        run: |
          # package.json
          jq --arg v "$V" '.version = $v' package.json \
            > _tmp && mv _tmp package.json

          # package-lock.json — update both top-level version and packages[""].version
          jq --arg v "$V" '.version = $v | .packages[""].version = $v' package-lock.json \
            > _tmp && mv _tmp package-lock.json

          # tauri.conf.json
          jq --arg v "$V" '.version = $v' src-tauri/tauri.conf.json \
            > _tmp && mv _tmp src-tauri/tauri.conf.json

          # Cargo.toml — replace the first `version = "…"` line (in [package])
          sed -i "0,/^version = \"[^\"]*\"/{s/^version = \"[^\"]*\"/version = \"${V}\"/}" \
            src-tauri/Cargo.toml

          # Cargo.lock — update the [[package]] entry for mpbt-launcher
          python3 - <<EOF
          import re, os
          v    = os.environ['V']
          path = 'src-tauri/Cargo.lock'
          txt  = open(path).read()
          txt  = re.sub(
              r'(\[\[package\]\]\nname = "mpbt-launcher"\nversion = ")[^"]*(")',
              lambda m: m.group(1) + v + m.group(2),
              txt,
          )
          open(path, 'w').write(txt)
          EOF

      # ── Commit and push ────────────────────────────────────────────────────
      - name: Commit and push
        if: steps.resolve.outputs.should_bump == 'true' && steps.resolve.outputs.current != steps.resolve.outputs.new
        env:
          V: ${{ steps.resolve.outputs.new }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json \
                  package-lock.json \
                  src-tauri/tauri.conf.json \
                  src-tauri/Cargo.toml \
                  src-tauri/Cargo.lock
          git commit -m "chore: bump version to ${V} [skip ci]"
          git push
